<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Room Booking | TouchMe+</title>

  <link rel="icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="favicon.ico" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <header class="header">
    <div class="container header__inner">
      <a class="brand" href="index.html">
        <div class="brand__logo">
          <img src="assets/logo.png" alt="TouchMe+ logo">
        </div>

        <div class="brand__text">
          <div class="brand__name">TouchMe+</div>
          <div class="brand__tagline">Smart Bus & Room Booking</div>
        </div>
      </a>

      <div class="header__actions">
        <button class="icon-btn" id="themeToggle" aria-label="Toggle theme" title="Toggle theme">
          🌙
        </button>

        <a class="btn btn--primary" href="index.html">
          Home
        </a>
      </div>
    </div>

    <div class="header__accent"></div>
  </header>

  <main>
    <section class="coming-soon-page">
      <div class="container">
        <div class="coming-soon-card">

          <div class="coming-soon-icon">🏨</div>

          <h1>Coming Soon</h1>

          <p class="coming-soon-subtitle">
            TouchMe+ Room Booking is getting ready.
          </p>

          <p class="coming-soon-text">
            Soon you will be able to find and book rooms, hotels, guest houses,
            and stays across Sri Lanka through TouchMe+.
          </p>

          <div class="coming-soon-pills">
            <span>Hotels</span>
            <span>Rooms</span>
            <span>Guest Houses</span>
            <span>Stays</span>
          </div>

          <div class="coming-soon-actions">
            <a class="btn btn--primary btn--lg" href="index.html">
              Back to Home
            </a>

            <a class="btn btn--ghost btn--lg" href="mailto:touchmeplus.a@gmail.com">
              Contact Us
            </a>
          </div>

        </div>
      </div>
    </section>

  <script src="script.js"></script>

</html>
